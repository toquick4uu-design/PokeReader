name: Build Plugin
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile
        run: make
      - uses: actions/upload-artifact@v4
        with:
          name: PokeReader-Plugin
          path: default.3gx
