name: Build 3GX Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust nightly
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Configure cargo for 3DS
      run: |
        rustup default nightly
        # Override CARGO to always pass -Z build-std
        echo "CARGO=cargo -Z build-std" >> $GITHUB_ENV
        # Tell cargo which linker to use (provided by devkitARM)
        echo "CARGO_TARGET_ARM6K_NINTENDO_3DS_LINKER=arm-none-eabi-gcc" >> $GITHUB_ENV
        # Optional but often needed for 3DS
        echo "RUSTFLAGS=-C target-feature=+crt-static" >> $GITHUB_ENV

    - name: Install 3gxtool
      run: |
        apt-get update
        apt-get install -y wget unzip
        wget https://github.com/Nanquitas/3gxtool/releases/latest/download/3gxtool-linux-x86_64.zip
        unzip 3gxtool-linux-x86_64.zip
        chmod +x 3gxtool
        mv 3gxtool /usr/local/bin/

    - name: Build with Make
      run: make

    - name: Upload 3GX artifact
      uses: actions/upload-artifact@v4
      with:
        name: PokeReader-3GX
        path: default.3gx
