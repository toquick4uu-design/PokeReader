name: Build 3GX Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust nightly
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Configure cargo for 3DS
      run: |
        rustup default nightly
        echo "CARGO=cargo -Z build-std" >> $GITHUB_ENV
        echo "CARGO_TARGET_ARM6K_NINTENDO_3DS_LINKER=arm-none-eabi-gcc" >> $GITHUB_ENV
        echo "RUSTFLAGS=-C target-feature=+crt-static" >> $GITHUB_ENV

    - name: Install 3gxtool (via dkp-pacman)
      run: |
        dkp-pacman -S 3gxtool --noconfirm

    - name: Build with Make
      run: make

    - name: Upload 3GX artifact
      uses: actions/upload-artifact@v4
      with:
        name: PokeReader-3GX
        path: default.3gx
