name: Build 3GX Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Add 3DS Rust target
      run: rustup target add armv6k-nintendo-3ds

    - name: Install 3gxtool
      run: |
        apt-get update
        apt-get install -y wget
        wget https://github.com/Nanquitas/3gxtool/releases/latest/download/3gxtool-linux-x86_64.zip
        unzip 3gxtool-linux-x86_64.zip
        chmod +x 3gxtool
        mv 3gxtool /usr/local/bin/

    - name: Build with Make
      run: make

    - name: Upload 3GX artifact
      uses: actions/upload-artifact@v4
      with:
        name: PokeReader-3GX
        path: default.3gx
